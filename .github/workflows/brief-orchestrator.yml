name: Brief Orchestrator

on:
  push:
    branches:
      - main
    paths:
      - "briefs/**/00-provider-request.md"
      - "scripts/brief-orchestrator.mjs"
      - ".github/workflows/brief-orchestrator.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Orchestrator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: npm run brief

      - name: Commit generated brief files
        run: |
          git config user.name "brief-orchestrator"
          git config user.email "brief-orchestrator@users.noreply.github.com"
          git add briefs/
          if git diff --cached --quiet; then
            echo "No generated files to commit."
          else
            git commit -m "Generate brief files [skip ci]"
            git push
          fi
